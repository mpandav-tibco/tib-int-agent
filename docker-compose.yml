version: "3.9"

services:

  # ── Weaviate vector store ────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.29.0
    ports:
      - "8080:8080"   # HTTP / REST
      - "50051:50051" # gRPC (required by weaviate-client v4)
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      ENABLE_MODULES: ""
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AgentForge API + React UI ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      WEAVIATE_URL: http://weaviate:8080
      CHAINLIT_URL: http://chainlit:8080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-deepseek-r1:latest}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      COLLECTION_NAME: ${COLLECTION_NAME:-TibcoKnowledge}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-180}
    volumes:
      - ./data:/app/data
    depends_on:
      weaviate:
        condition: service_healthy
    restart: unless-stopped

  # ── TARA / Chainlit chat UI ──────────────────────────────────────────────────
  chainlit:
    build: .
    ports:
      - "8080:8080"
    environment:
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-deepseek-r1:latest}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      COLLECTION_NAME: ${COLLECTION_NAME:-TibcoKnowledge}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-180}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-}
      TARA_USERNAME: ${TARA_USERNAME:-tara}
      TARA_PASSWORD: ${TARA_PASSWORD:-tara}
      AGENT_ID: ${AGENT_ID:-}
    volumes:
      - ./data:/app/data
    depends_on:
      weaviate:
        condition: service_healthy
    restart: unless-stopped

volumes:
  weaviate_data:
