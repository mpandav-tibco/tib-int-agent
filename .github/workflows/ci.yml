name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Python: analyzers, agent_store, and lint ─────────────────────────────────
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyzer + agent_store unit tests
        run: pytest tests/ test_analyzers.py -v -k "not weaviate and not rag"
        env:
          RERANKER_ENABLED: "false"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501 --exclude .venv

  # ── React SPA: TypeScript type-check + production build ──────────────────────
  forge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: forge/package-lock.json

      - name: Install forge dependencies
        run: npm ci
        working-directory: forge

      - name: TypeScript type-check + Vite build
        run: npm run build
        working-directory: forge
